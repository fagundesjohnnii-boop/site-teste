<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Site</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f0f0f0; }
        form { display: flex; flex-direction: column; width: 300px; }
        input, textarea { margin: 10px 0; padding: 10px; font-size: 16px; }
        button { padding: 10px; font-size: 16px; background-color: blue; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Editor de Site</h1>
    <form id="siteForm">
        <label for="siteName">Nome do Site:</label>
        <input type="text" id="siteName" name="siteName" required>
        <label for="description">Descrição:</label>
        <textarea id="description" name="description" required></textarea>
        <button type="submit">Criar Site</button>
    </form>
    <script>
        document.getElementById('siteForm').onsubmit = async (e) => {
            e.preventDefault();
            const siteName = document.getElementById('siteName').value;
            const description = document.getElementById('description').value;
            const response = await fetch('/generate-content', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ siteName, description })
            });
            const data = await response.json();
            console.log(data);
            alert('Site criado com sucesso!');
        };
    </script>
</body>
</html>
